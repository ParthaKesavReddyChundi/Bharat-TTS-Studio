  # ── Microsoft SpeechT5 — High quality neural TTS ──
  - id: speecht5-hi
    name: Microsoft SpeechT5
    description: |
      High quality neural TTS by Microsoft. 
      Uses SpeechT5 transformer + HiFiGAN vocoder. 
  # ── Silero TTS — Fast compact VITS-based ──
  - id: silero-hi
    name: Silero TTS
    description: |
      Fast, compact VITS-based TTS from Silero.
      Hindi voice with natural prosody. 
      First run downloads ~60MB. Fully open access.
    adapter_type: silero
    languages: [hi, mr]
    language_code: "hi"
    silero_model_id: "v3_indic"
    sample_rate: 48000
    speakers:
      hi:
        - { id: "hindi_male", name: "Hindi Male" }
        - { id: "hindi_female", name: "Hindi Female" }
      mr:
        - { id: "hindi_male", name: "Marathi Male" }
        - { id: "hindi_female", name: "Marathi Female" }

  # ── Suno Bark (Small) — Expressive generative TTS ──
  - id: bark-small-multi
    name: Suno Bark (Small)
    description: |
      Expressive LLM-based generative TTS by Suno.
      Supports Hindi, English, and 11 more languages naturally.
    adapter_type: bark
    languages: [hi, en, ta, te, bn]
    repo_id: suno/bark-small
    speakers:
      hi:
        - { id: "v2/hi_speaker_0", name: "Male 1" }
        - { id: "v2/hi_speaker_1", name: "Female 1" }
        - { id: "v2/hi_speaker_2", name: "Male 2" }
        - { id: "v2/hi_speaker_3", name: "Female 2" }
      en:
        - { id: "v2/en_speaker_0", name: "Male 1" }
        - { id: "v2/en_speaker_1", name: "Male 2" }
        - { id: "v2/en_speaker_2", name: "Male 3" }
        - { id: "v2/en_speaker_3", name: "Male 4" }
        - { id: "v2/en_speaker_9", name: "Female 1" }
      ta:
        - { id: "v2/ta_speaker_0", name: "Male 1" }
        - { id: "v2/ta_speaker_1", name: "Female 1" }
      te:
        - { id: "v2/te_speaker_0", name: "Male 1" }
        - { id: "v2/te_speaker_1", name: "Female 1" }
      bn:
